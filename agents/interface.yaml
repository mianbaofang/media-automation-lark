interface:
  display_name: "自媒体自动化（飞书 CLI）"
  short_description: "lark-cli 内容归档/数据可视化/素材管理 + 全网搜索采集分类 + renhua 去AI味"
  default_prompt: "搭建一个自媒体自动化工作流：用 lark-cli 把 RSS/API 内容、多平台数据指标、文章/图片/PDF 素材抓取、结构化并归档到飞书多维表格与云文档，并配置定时任务；还可按检索词自动采集全网文章存成分类 Markdown（场景 D）。先跑 scripts/env-check.py --auto-install 检测环境，再按场景 A/B/C/D 执行对应脚本。产出的中文文字默认经 renhua（人话）去 AI 味润色。"
